name: Gold Breakout Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes, matches the breakout strategy's candles
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run breakout bot (single check-and-act cycle)
        env:
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
        run: python breakout_bot.py

      - name: Commit updated logs (if changed)
        run: |
          git config user.name "breakout-bot"
          git config user.email "breakout-bot@users.noreply.github.com"
          git add breakout_trades_log.csv breakout_bot_heartbeat.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update breakout bot logs [skip ci]"
          git push
